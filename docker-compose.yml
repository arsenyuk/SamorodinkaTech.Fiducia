services:
  postgres:
    image: postgres:16
    container_name: fiducia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fiducia
      POSTGRES_USER: fiducia
      POSTGRES_PASSWORD: fiducia
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fiducia -d fiducia"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: fiducia-keycloak
    restart: unless-stopped
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    command: start-dev --http-port 8080
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 && echo -e 'GET /health/ready HTTP/1.1\nHost: localhost\n\n' >&3 && grep -q UP <&3"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

volumes:
  postgres_data:
