services:
  postgres:
    image: postgres:16
    container_name: fiducia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fiducia
      POSTGRES_USER: fiducia
      POSTGRES_PASSWORD: fiducia
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fiducia -d fiducia"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
